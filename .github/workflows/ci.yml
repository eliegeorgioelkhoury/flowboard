name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright + real Supabase)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase (applies migrations + seed)
        run: supabase start
      - name: Export local Supabase env
        run: |
          eval "$(supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build (with Supabase env)
        run: npm run build
      - name: Run E2E (drag-and-drop against real Supabase)
        run: npm run e2e
      - name: Stop Supabase
        if: always()
        run: supabase stop || true
